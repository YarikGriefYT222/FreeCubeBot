<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visuals Roulette</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffd700; --blue: #0088cc; --green: #2ecc71; --bg: #0f0f0f; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Профиль */
        .profile-card { background: #1a1a1a; width: 90%; margin: 20px 0; padding: 15px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .stats { display: flex; justify-content: space-around; font-size: 14px; margin-bottom: 10px; }
        .stat-val { color: var(--gold); font-weight: bold; display: block; font-size: 18px; }
        .reset-btn { background: transparent; border: 1px solid #444; color: #777; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; }

        /* Рулетка */
        .roulette-box { position: relative; width: 320px; height: 120px; border: 3px solid #333; border-radius: 12px; overflow: hidden; background: #000; margin: 20px 0; }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: red; z-index: 5; transform: translateX(-50%); box-shadow: 0 0 10px red; }
        .tape { display: flex; position: absolute; left: 0; top: 0; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .slot { min-width: 80px; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #111; font-size: 10px; font-weight: bold; text-align: center; }

        /* Цвета предметов */
        .win-year { background: linear-gradient(45deg, #443a00, #ffd700); color: black; }
        .win-month { background: linear-gradient(45deg, #001f3f, #0088cc); }
        .win-week { background: linear-gradient(45deg, #0a2e16, #2ecc71); }
        .win-null { background: #222; color: #555; }

        .spin-button { background: var(--gold); color: black; border: none; padding: 18px 40px; font-size: 20px; font-weight: 800; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); transition: 0.3s; width: 80%; }
        .spin-button:disabled { background: #444; color: #888; transform: scale(0.95); box-shadow: none; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="stats">
            <div>Траты: <span class="stat-val" id="totalSpent">0 ⭐</span></div>
            <div>Побед: <span class="stat-val" id="winCount">0</span></div>
        </div>
        <button class="reset-btn" onclick="resetStats()">Обнулить профиль</button>
    </div>

    <div class="roulette-box">
        <div class="pointer"></div>
        <div id="tape" class="tape"></div>
    </div>

    <button id="spinBtn" class="spin-button" onclick="handlePayment()">КРУТИТЬ ЗА 15 ⭐</button>
    <p id="msg" style="color: #888; margin-top: 15px;"></p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let spent = parseInt(localStorage.getItem('spent')) || 0;
        let wins = parseInt(localStorage.getItem('wins')) || 0;

        function updateUI() {
            document.getElementById('totalSpent').innerText = spent + " ⭐";
            document.getElementById('winCount').innerText = wins;
        }

        const itemsData = [
            { label: 'ГОД', class: 'win-year', chance: 30 },    // 3% (30 из 1000)
            { label: '30 ДНЕЙ', class: 'win-month', chance: 50 }, // 5%
            { label: '7 ДНЕЙ', class: 'win-week', chance: 70 },   // 7%
            { label: 'ПУСТО', class: 'win-null', chance: 850 }    // 85%
        ];

        function createSlot(data) {
            const div = document.createElement('div');
            div.className = `slot ${data.class}`;
            div.innerHTML = `<span>VISUALS</span><br><b>${data.label}</b>`;
            return div;
        }

        function initTape() {
            const tape = document.getElementById('tape');
            tape.innerHTML = '';
            for(let i=0; i<100; i++) {
                const randomItem = itemsData[Math.floor(Math.random() * itemsData.length)];
                tape.appendChild(createSlot(randomItem));
            }
        }

        async function handlePayment() {
            // ВАЖНО: В реальном Telegram Web App вызов платежа идет через API бота (метод createInvoiceLink)
            // Здесь мы имитируем процесс оплаты для визуализации
            tg.showConfirm("Вы подтверждаете оплату 15 ⭐?", (confirmed) => {
                if(confirmed) {
                    spent += 15;
                    localStorage.setItem('spent', spent);
                    updateUI();
                    startSpin();
                }
            });
        }

        function startSpin() {
            const btn = document.getElementById('spinBtn');
            const tape = document.getElementById('tape');
            btn.disabled = true;

            // Расчет результата
            const rng = Math.floor(Math.random() * 1000);
            let result;
            if (rng < 30) result = itemsData[0]; // Год
            else if (rng < 80) result = itemsData[1]; // Месяц
            else if (rng < 150) result = itemsData[2]; // Неделя
            else result = itemsData[3]; // Пусто

            // Подменяем 80-й элемент (на него приземлится стрелка)
            const targetIdx = 80;
            const targetSlot = tape.children[targetIdx];
            targetSlot.className = `slot ${result.class}`;
            targetSlot.innerHTML = `<span>VISUALS</span><br><b>${result.label}</b>`;

            // Анимация
            const slotWidth = 80;
            const finalPos = (targetIdx * slotWidth) - (160 - slotWidth/2);
            const randomOffset = Math.floor(Math.random() * 50) - 25;
            
            tape.style.transition = 'none';
            tape.style.transform = `translateX(0px)`;
            
            setTimeout(() => {
                tape.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.1, 1)';
                tape.style.transform = `translateX(-${finalPos + randomOffset}px)`;
            }, 50);

            setTimeout(() => {
                if (result.label !== 'ПУСТО') {
                    wins++;
                    localStorage.setItem('wins', wins);
                    tg.showAlert(`🔥 ПОЗДРАВЛЯЕМ! Вы выбили: ${result.label}`);
                } else {
                    document.getElementById('msg').innerText = "В этот раз не повезло...";
                }
                updateUI();
                btn.disabled = false;
                initTape();
            }, 5500);
        }

        function resetStats() {
            if(confirm("Обнулить все победы и траты?")) {
                spent = 0;
                wins = 0;
                localStorage.clear();
                updateUI();
            }
        }

        updateUI();
        initTape();
    </script>
</body>
</html>
