<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Информация</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-color: #1c1c1e;
            --accent-color: #007aff;
            --nav-bg: #ffffff;
        }
        body.dark {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-color: #ffffff;
            --accent-color: #0a84ff;
            --nav-bg: #121212;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
            transition: background 0.3s;
            padding-bottom: 70px;
        }

        /* Шапка */
        .header { padding: 20px; text-align: center; font-size: 20px; font-weight: bold; border-bottom: 1px solid #ccc; }

        /* Контентные секции */
        .page { display: none; padding: 15px; }
        .page.active { display: block; }

        /* Админ-панель */
        .admin-panel { 
            display: none; 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Карточки новостей */
        .news-card { 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .category { font-size: 12px; font-weight: bold; color: var(--accent-color); margin-bottom: 5px; text-transform: uppercase; }

        /* Поля ввода */
        select, textarea, button { 
            width: 100%; margin: 8px 0; padding: 12px; 
            border-radius: 8px; border: 1px solid #ccc; 
            background: var(--card-bg); color: var(--text-color);
            box-sizing: border-box; font-size: 14px;
        }
        button { background: var(--accent-color); color: white; border: none; font-weight: bold; cursor: pointer; }

        /* Нижняя навигация */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: var(--nav-bg); display: flex;
            border-top: 1px solid #333; justify-content: space-around; align-items: center;
        }
        .nav-item { text-align: center; flex: 1; cursor: pointer; opacity: 0.6; font-size: 14px; }
        .nav-item.active { opacity: 1; color: var(--accent-color); font-weight: bold; }

        /* Опции */
        .option-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card-bg); border-radius: 12px; }
    </style>
</head>
<body>

    <div class="header">Информация</div>

    <div id="page-info" class="page active">
        <div id="adminPanel" class="admin-panel">
            <strong>📢 Создать новость (Админ)</strong>
            <select id="category">
                <option value="Основа: Yarik_Grief">Основа: Yarik_Grief</option>
                <option value="второй канал: Heim">второй канал: Heim</option>
                <option value="Секрет....">Секрет....</option>
            </select>
            <textarea id="newsText" rows="3" placeholder="О чем ролик?"></textarea>
            <button onclick="postNews()">Опубликовать</button>
        </div>
        <div id="newsFeed">Загрузка ленты...</div>
    </div>

    <div id="page-options" class="page">
        <h3>Настройки приложения</h3>
        <div class="option-row" onclick="toggleTheme()">
            <span>Сменить тему (Светлая/Темная)</span>
            <span>🌓</span>
        </div>
        <p style="text-align: center; font-size: 12px; opacity: 0.5; margin-top: 20px;">Версия 1.0.2</p>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="btn-info" onclick="showPage('info')">📰 Информация</div>
        <div class="nav-item" id="btn-options" onclick="showPage('options')">⚙️ Опции</div>
    </div>

    <script>
        // Твои настройки Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA-tvZ6EUAD_QqmPlpBzXJDyr3ra_VQ-Ws",
            appId: "1:744143799736:web:ea39151db70f2d62c4bb4d",
            databaseURL: "https://ruminenewsbot-default-rtdb.firebaseio.com",
            projectId: "ruminenewsbot"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tg = window.Telegram.WebApp;
        tg.expand();

        // Проверка прав админа
        const adminId = 6086871004;
        if (tg.initDataUnsafe?.user?.id === adminId) {
            document.getElementById('adminPanel').style.display = 'block';
        }

        // Переключение вкладок
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('btn-' + pageId).classList.add('active');
        }

        // Смена темы
        function toggleTheme() {
            document.body.classList.toggle('dark');
        }

        // Публикация новости
        function postNews() {
            const text = document.getElementById('newsText').value;
            const cat = document.getElementById('category').value;
            if(!text) return;

            db.ref('news').push({
                text: text,
                category: cat,
                timestamp: Date.now()
            });
            document.getElementById('newsText').value = "";
            tg.HapticFeedback.notificationOccurred('success');
        }

        // Получение данных
        db.ref('news').on('value', (snapshot) => {
            const feed = document.getElementById('newsFeed');
            feed.innerHTML = "";
            let items = [];
            snapshot.forEach((child) => { items.push(child.val()); });
            
            items.reverse().forEach(data => {
                feed.innerHTML += `
                    <div class="news-card">
                        <div class="category">${data.category}</div>
                        <div class="text">${data.text}</div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
