<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RuMine News</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00e5ff;
            --bg-main: #020202;
            --surface: #0d0d0d;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --border: rgba(255, 255, 255, 0.05);
        }

        body.light-theme {
            --bg-main: #f0f2f5;
            --surface: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #65676b;
            --border: rgba(0, 0, 0, 0.1);
        }

        body {
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            transition: all 0.3s ease;
        }

        .app-header {
            position: sticky; top: 0; background: var(--bg-main);
            padding: 18px; z-index: 1000;
            border-bottom: 1px solid var(--border); text-align: center;
        }

        .view-container { padding: 15px; padding-bottom: 100px; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px; padding: 16px; margin-bottom: 12px;
            position: relative;
        }

        .server-title { font-weight: 800; font-size: 16px; display: block; color: var(--accent); }
        .server-sub { font-size: 12px; margin: 4px 0; display: block; font-weight: 600; }
        .server-ip { font-family: monospace; font-size: 13px; color: var(--text-secondary); background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: var(--surface); border-top: 1px solid var(--border);
            display: grid; grid-template-columns: repeat(3, 1fr); z-index: 1001;
        }

        .nav-link {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-secondary); font-size: 10px; font-weight: 600; cursor: pointer;
        }

        .nav-link.active { color: var(--accent); }

        .opt-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        select, .btn-theme, .admin-btn { background: var(--accent); border: none; padding: 8px 12px; border-radius: 8px; font-weight: 700; cursor: pointer; color: #000; }

        /* Админские штучки */
        .del-btn { position: absolute; top: 10px; right: 10px; background: #ff4444; color: #fff; border: none; border-radius: 5px; padding: 2px 8px; font-size: 10px; display: none; }
        .save-btn { width: 100%; margin-top: 15px; background: #00ff88; display: none; }
        .add-btn { width: 100%; margin-bottom: 15px; background: var(--accent); display: none; }
    </style>
</head>
<body class="dark-theme">

    <header class="app-header">
        <h1 id="app-title" style="margin:0; font-size: 16px; letter-spacing: 2px;">RUMINE NEWS</h1>
    </header>

    <div class="view-container">
        <div id="news" class="view-section active">
            <button class="admin-btn add-btn" onclick="addCard('news')">+ Добавить новость</button>
            <div id="news-list">Загрузка...</div>
        </div>

        <div id="servers" class="view-section">
            <button class="admin-btn add-btn" onclick="addCard('servers')">+ Добавить сервер</button>
            <div id="servers-list">Загрузка...</div>
        </div>

        <div id="options" class="view-section">
            <div class="card">
                <div class="opt-row">
                    <span id="label-user">Аккаунт:</span>
                    <span id="user-info" style="color: var(--accent);">Гость</span>
                </div>
                <div class="opt-row">
                    <span id="label-lang">Язык:</span>
                    <select id="lang-select" onchange="changeLang()">
                        <option value="ru">Русский</option>
                        <option value="ua">Українська</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <div class="opt-row">
                    <span id="label-theme">Тема:</span>
                    <button class="btn-theme" onclick="toggleTheme()" id="theme-btn">DARK</button>
                </div>
                <button id="publish-btn" class="admin-btn save-btn">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-link active" onclick="tab('news', this)"><span id="nav-news-text">Новости</span></div>
        <div class="nav-link" onclick="tab('servers', this)"><span id="nav-top-text">Топ</span></div>
        <div class="nav-link" onclick="tab('options', this)"><span id="nav-opt-text">Опции</span></div>
    </nav>

    <script>
        // КОНФИГ БАЗЫ (Твои данные уже тут)
        const firebaseConfig = {
            apiKey: "AIzaSyA-tvZ6EUAD_QqmPlpBzXJDyr3ra_VQ-Ws",
            databaseURL: "ВСТАВЬ_СВОЙ_DATABASE_URL_БЕЛЬГИЯ", 
            projectId: "ruminenewsbot",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const ADMIN_ID = 6086871004;
        const userTgId = tg.initDataUnsafe?.user?.id || 0;

        const translations = {
            ru: { news: "Новости", top: "Топ", opt: "Опции", user: "Аккаунт", lang: "Язык", theme: "Тема" },
            ua: { news: "Новини", top: "Топ", opt: "Опції", user: "Акаунт", lang: "Мова", theme: "Тема" },
            en: { news: "News", top: "Top", opt: "Options", user: "Account", lang: "Language", theme: "Theme" }
        };

        function loadData() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                
                renderNews(data.news || []);
                renderServers(data.servers || []);
            });
        }

        function renderNews(list) {
            const cont = document.getElementById('news-list');
            cont.innerHTML = '';
            list.forEach((item, i) => {
                cont.innerHTML += `
                    <div class="card" data-index="${i}">
                        <button class="del-btn" onclick="this.parentElement.remove()">X</button>
                        <span class="server-title" contenteditable="${userTgId === ADMIN_ID}">${item.title}</span>
                        <span class="server-sub" contenteditable="${userTgId === ADMIN_ID}">${item.desc}</span>
                    </div>`;
            });
            checkAdmin();
        }

        function renderServers(list) {
            const cont = document.getElementById('servers-list');
            cont.innerHTML = '';
            list.forEach((item, i) => {
                cont.innerHTML += `
                    <div class="card" data-index="${i}">
                        <button class="del-btn" onclick="this.parentElement.remove()">X</button>
                        <span class="server-title" contenteditable="${userTgId === ADMIN_ID}">${item.name}</span>
                        <span class="server-sub" contenteditable="${userTgId === ADMIN_ID}">${item.type}</span>
                        <span class="server-ip" contenteditable="${userTgId === ADMIN_ID}">${item.ip}</span>
                    </div>`;
            });
            checkAdmin();
        }

        function addCard(type) {
            const listId = type === 'news' ? 'news-list' : 'servers-list';
            const cont = document.getElementById(listId);
            const html = type === 'news' ? 
                `<div class="card"><button class="del-btn" style="display:block" onclick="this.parentElement.remove()">X</button><span class="server-title" contenteditable="true">Заголовок</span><span class="server-sub" contenteditable="true">Описание</span></div>` :
                `<div class="card"><button class="del-btn" style="display:block" onclick="this.parentElement.remove()">X</button><span class="server-title" contenteditable="true">Название</span><span class="server-sub" contenteditable="true">Гриф/Анка</span><span class="server-ip" contenteditable="true">0.0.0.0</span></div>`;
            cont.insertAdjacentHTML('afterbegin', html);
        }

        function checkAdmin() {
            if (userTgId === ADMIN_ID) {
                document.querySelectorAll('.del-btn, .add-btn, .save-btn').forEach(el => el.style.display = 'block');
            }
        }

        document.getElementById('publish-btn').onclick = () => {
            const news = [];
            document.querySelectorAll('#news-list .card').forEach(c => {
                news.push({ title: c.querySelector('.server-title').innerText, desc: c.querySelector('.server-sub').innerText });
            });
            const servers = [];
            document.querySelectorAll('#servers-list .card').forEach(c => {
                servers.push({ name: c.querySelector('.server-title').innerText, type: c.querySelector('.server-sub').innerText, ip: c.querySelector('.server-ip').innerText });
            });
            db.ref('/').set({ news, servers }).then(() => alert("Данные обновлены для всех!"));
        };

        function changeLang() {
            const l = document.getElementById('lang-select').value;
            const t = translations[l];
            document.getElementById('nav-news-text').innerText = t.news;
            document.getElementById('nav-top-text').innerText = t.top;
            document.getElementById('nav-opt-text').innerText = t.opt;
            document.getElementById('label-user').innerText = t.user + ":";
            document.getElementById('label-lang').innerText = t.lang + ":";
            document.getElementById('label-theme').innerText = t.theme + ":";
        }

        function toggleTheme() {
            const b = document.body;
            const btn = document.getElementById('theme-btn');
            b.classList.toggle('light-theme');
            btn.innerText = b.classList.contains('light-theme') ? 'LIGHT' : 'DARK';
        }

        function tab(id, el) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        window.onload = () => {
            if (tg.initDataUnsafe?.user) {
                const u = tg.initDataUnsafe.user;
                document.getElementById('user-info').innerText = `${u.first_name} (ID: ${u.id})`;
                tg.expand();
            }
            loadData();
            changeLang();
        };
    </script>
</body>
</html>
