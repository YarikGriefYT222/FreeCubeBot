<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RuMine News Elite</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #003344, transparent), radial-gradient(circle at bottom left, #110022, transparent);
            background-attachment: fixed;
            min-height: 100vh;
        }

        #access-error { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }

        .header {
            padding: 25px 20px;
            text-align: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .header h1 {
            margin: 0; font-size: 20px; font-weight: 800; letter-spacing: 3px;
            text-transform: uppercase; background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Категории (Чипсы) */
        .filter-bar {
            display: flex; gap: 10px; padding: 15px 20px; overflow-x: auto;
            scrollbar-width: none;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        
        .chip {
            padding: 8px 18px; border-radius: 20px; background: var(--card-bg);
            border: 1px solid var(--border); font-size: 12px; font-weight: 600;
            white-space: nowrap; transition: 0.3s; color: var(--text-dim);
        }
        .chip.active {
            background: var(--accent); color: #000; border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .container { padding: 0 20px 120px 20px; }
        .view { display: none; }
        .view.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .card {
            background: var(--card-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; margin-bottom: 15px; position: relative;
            transition: 0.3s;
        }

        .card:active { transform: scale(0.98); }

        .tag {
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            color: var(--accent); margin-bottom: 8px; display: block;
        }

        .title { font-size: 17px; font-weight: 700; margin-bottom: 6px; display: block; }
        .desc { font-size: 14px; color: var(--text-dim); line-height: 1.5; }
        .ip-box {
            margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.3);
            border-radius: 12px; border: 1px solid var(--border);
            font-family: monospace; color: var(--accent); display: flex; justify-content: space-between;
        }

        /* Навигация */
        .nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 25px;
            height: 70px; display: grid; grid-template-columns: repeat(3, 1fr);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-dim); font-size: 10px; font-weight: 700; gap: 4px;
        }
        .nav-item.active { color: var(--accent); }

        /* Админ-кнопки */
        .admin-btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 15px; font-weight: 800; width: 100%; margin-bottom: 15px; display: none; }
        .del-btn { position: absolute; top: 15px; right: 15px; background: #ff3355; color: #fff; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 12px; display: none; }
        
        .edit-area { background: transparent; border: 1px dashed var(--accent); color: #fff; width: 100%; padding: 5px; margin: 2px 0; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="access-error">
        <h1 style="color:var(--accent)">RESTRICTED</h1>
        <p>Open via RuMine News Bot</p>
    </div>

    <div class="header">
        <h1>RuMine Elite</h1>
    </div>

    <div id="filter-container" class="filter-bar">
        </div>

    <div class="container">
        <div id="news" class="view active">
            <button class="admin-btn" id="add-news-btn" onclick="addNewItem('news')">+ НОВАЯ НОВОСТЬ</button>
            <div id="news-list"></div>
        </div>

        <div id="servers" class="view">
            <button class="admin-btn" id="add-srv-btn" onclick="addNewItem('servers')">+ НОВЫЙ СЕРВЕР</button>
            <div id="servers-list"></div>
        </div>

        <div id="options" class="view">
            <div class="card">
                <div class="opt-row" style="display:flex; justify-content: space-between; margin-bottom: 20px;">
                    <span style="color:var(--text-dim)">ID:</span>
                    <span id="user-id" style="color:var(--accent)">...</span>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:10px; font-size:12px; font-weight:800; color:var(--text-dim)">LANGUAGE / ЯЗЫК</label>
                    <select id="lang-select" onchange="changeLanguage()" style="width:100%; padding:12px; background:var(--bg); color:#fff; border:1px solid var(--border); border-radius:12px;">
                        <option value="ru">Русский</option>
                        <option value="ua">Українська</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <button id="save-all" class="admin-btn" style="background:#00ff88" onclick="saveToFirebase()">СОХРАНИТЬ ВСЕ ЯЗЫКИ</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('news', this)" id="n-news">НОВОСТИ</div>
        <div class="nav-item" onclick="tab('servers', this)" id="n-top">ТОП</div>
        <div class="nav-item" onclick="tab('options', this)" id="n-opt">ОПЦИИ</div>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA-tvZ6EUAD_QqmPlpBzXJDyr3ra_VQ-Ws",
            databaseURL: "https://ruminenewsbot-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "ruminenewsbot"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const ADMIN_ID = 6086871004;
        
        let currentLang = 'ru';
        let currentUserId = 0;
        let currentFilter = 'Все';
        let allData = { ru: { news: [], servers: [] }, ua: { news: [], servers: [] }, en: { news: [], servers: [] } };

        const translations = {
            ru: { n: "НОВОСТИ", t: "ТОП", o: "ОПЦИИ", cat_n: ["Все", "Сервера", "Ютуберы"], cat_s: ["Все", "Гриф", "Анархия"] },
            ua: { n: "НОВИНИ", t: "ТОП", o: "ОПЦІЇ", cat_n: ["Все", "Сервера", "Ютубери"], cat_s: ["Все", "Гриф", "Анархія"] },
            en: { n: "NEWS", t: "TOP", o: "OPTIONS", cat_n: ["All", "Servers", "YouTubers"], cat_s: ["All", "Grief", "Anarchy"] }
        };

        function changeLanguage() {
            currentLang = document.getElementById('lang-select').value;
            currentFilter = translations[currentLang].cat_n[0]; // Сброс фильтра
            updateUI();
        }

        function updateUI() {
            const T = translations[currentLang];
            document.getElementById('n-news').innerText = T.n;
            document.getElementById('n-top').innerText = T.t;
            document.getElementById('n-opt').innerText = T.o;
            
            renderFilters();
            renderContent();
        }

        function renderFilters() {
            const isNews = document.getElementById('news').classList.contains('active');
            const cats = isNews ? translations[currentLang].cat_n : translations[currentLang].cat_s;
            const cont = document.getElementById('filter-container');
            cont.innerHTML = '';
            
            cats.forEach(cat => {
                const activeClass = (cat === currentFilter) ? 'active' : '';
                cont.innerHTML += `<div class="chip ${activeClass}" onclick="setFilter('${cat}')">${cat}</div>`;
            });
        }

        function setFilter(f) {
            currentFilter = f;
            renderFilters();
            renderContent();
        }

        function loadData() {
            db.ref('/').on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    allData = data;
                    updateUI();
                }
            });
        }

        function renderContent() {
            const isNews = document.getElementById('news').classList.contains('active');
            const listCont = isNews ? document.getElementById('news-list') : document.getElementById('servers-list');
            listCont.innerHTML = '';

            const items = allData[currentLang][isNews ? 'news' : 'servers'] || [];
            
            items.forEach((item, idx) => {
                // Фильтрация
                const allText = isNews ? translations[currentLang].cat_n[0] : translations[currentLang].cat_s[0];
                if (currentFilter !== allText && item.cat !== currentFilter) return;

                let html = `<div class="card">
                    <button class="del-btn" onclick="deleteItem('${isNews ? 'news' : 'servers'}', ${idx})">✕</button>
                    <span class="tag">${item.cat}</span>`;
                
                if (isNews) {
                    html += `<span class="title" contenteditable="${currentUserId == ADMIN_ID}" id="edit-t-${idx}">${item.title}</span>
                             <span class="desc" contenteditable="${currentUserId == ADMIN_ID}" id="edit-d-${idx}">${item.desc}</span>`;
                } else {
                    html += `<span class="title">${item.name}</span>
                             <span class="desc" contenteditable="${currentUserId == ADMIN_ID}" id="edit-tp-${idx}">${item.type}</span>
                             <div class="ip-box"><span contenteditable="${currentUserId == ADMIN_ID}" id="edit-ip-${idx}">${item.ip}</span></div>`;
                }
                html += `</div>`;
                listCont.insertAdjacentHTML('beforeend', html);
            });
            checkAdmin();
        }

        function addNewItem(type) {
            const newItem = type === 'news' 
                ? { cat: "Сервера", title: "Заголовок", desc: "Описание" }
                : { cat: "Гриф", name: "Название", type: "Гриф/Анка", ip: "0.0.0.0" };
            
            // Добавляем во все языки (пустышки)
            ['ru', 'ua', 'en'].forEach(l => {
                if (!allData[l][type]) allData[l][type] = [];
                allData[l][type].unshift(newItem);
            });
            renderContent();
        }

        function deleteItem(type, idx) {
            ['ru', 'ua', 'en'].forEach(l => allData[l][type].splice(idx, 1));
            renderContent();
        }

        function saveToFirebase() {
            // Перед сохранением обновляем данные из contenteditable текущего языка
            const isNews = document.getElementById('news').classList.contains('active');
            const type = isNews ? 'news' : 'servers';
            
            allData[currentLang][type].forEach((item, idx) => {
                if (isNews) {
                    item.title = document.getElementById(`edit-t-${idx}`).innerText;
                    item.desc = document.getElementById(`edit-d-${idx}`).innerText;
                } else {
                    item.type = document.getElementById(`edit-tp-${idx}`).innerText;
                    item.ip = document.getElementById(`edit-ip-${idx}`).innerText;
                }
            });

            db.ref('/').set(allData).then(() => alert("Elite Cloud Sync: Success!"));
        }

        function checkAdmin() {
            if (currentUserId == ADMIN_ID) {
                document.querySelectorAll('.admin-btn, .del-btn').forEach(el => el.style.display = 'block');
            }
        }

        function tab(v, el) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(v).classList.add('active');
            el.classList.add('active');
            currentFilter = (v === 'news') ? translations[currentLang].cat_n[0] : translations[currentLang].cat_s[0];
            updateUI();
        }

        window.onload = () => {
            if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
                // Для теста на ПК закомментируй строку ниже
                document.getElementById('access-error').style.display = 'flex';
            } else {
                currentUserId = tg.initDataUnsafe.user.id;
                document.getElementById('user-id').innerText = currentUserId;
            }
            tg.expand();
            loadData();
        };
    </script>
</body>
</html>
